<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jardín Secreto | Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <header class="sticky-top">
        <nav class="navbar navbar-expand-lg navbar-dark bg-success">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center" href="index.html">
                    <img src="img/logo.svg" alt="Logo Jardín Secreto" width="40" height="40" class="me-2" />
                    <span class="fw-bold">Jardín Secreto</span>
                </a>
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" aria-controls="menuPrincipal" aria-expanded="false" aria-label="Menú de navegación">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="menuPrincipal">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" href="index.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="paginas/catalogo.html">Catálogo</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="paginas/contacto.html">Contacto</a>
                        </li>
                    </ul>
                    <a class="carrito-icono ms-lg-3" href="paginas/carrito.html">
                        <span>🛒</span>
                        <span class="badge rounded-pill bg-danger" id="contador-header">0</span>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="banner-principal" style="background-image: url('img/banner-principal.png'); background-size: cover; background-position: center; min-height: 350px; position: relative;">
            <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(45, 106, 79, 0.6);"></div>
            <div class="container banner-contenido" style="position: relative; z-index: 1; text-align: center; color: white;">
                <h1 class="display-4 fw-bold">Bienvenido a Jardín Secreto</h1>
                <p class="lead">Descubre la magia de las plantas en tu hogar</p>
                <a href="paginas/catalogo.html" class="btn btn-light btn-lg">Ver catálogo 🌿</a>
            </div>
        </section>

        <section class="container my-5">
            <h2 class="text-center text-success mb-4">Nuestros favoritos 🌿</h2>
            <div id="destacados-container" class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4"></div>
        </section>
    </main>

    <footer class="bg-success text-white text-center py-4 mt-5">
        <p class="mb-0">© 2026 Jardín Secreto - Cultivando bienestar 🌸</p>
    </footer>

    <div class="modal fade" id="modalDetalle" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalNombre">Nombre producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6">
                            <img id="modalImagen" src="" alt="" class="img-fluid rounded" />
                        </div>
                        <div class="col-md-6">
                            <p id="modalDescripcion" class="mb-3"></p>
                            <p id="modalCategoria" class="mb-2"><strong>Categoría:</strong></p>
                            <p id="modalDificultad" class="mb-2"><strong>Cuidado:</strong></p>
                            <h3 class="text-success" id="modalPrecio"></h3>
                            <button id="modalAgregar" class="btn btn-success w-100 mt-3">Agregar al carrito 🛒</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
    </script>
    <script src="js/data.js"></script>
    <script src="js/carrito.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/catalogo.js"></script>
    <script src="js/creativo.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
