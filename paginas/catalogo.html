<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo - Jardín Secreto</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">
            <img src="../img/logo.svg" alt="Logo Jardín Secreto">
            <h1>Jardín Secreto</h1>
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="contacto.html">Contacto</a></li>
                <li><a href="carrito.html">Carrito</a></li>
            </ul>
        </nav>
        <div class="carrito-icono">
            <span>🛒</span>
            <span class="contador-carrito" id="contador-header">0</span>
        </div>
    </header>

    <main>
        <section class="filtros">
            <input type="text" id="buscador" placeholder="🔍 Buscar plantas...">
            <div class="botones-filtro">
                <button data-filtro="todos" class="filtro-btn activo">Todos</button>
                <button data-filtro="facil" class="filtro-btn">Cuidado fácil 🌱</button>
                <button data-filtro="moderado" class="filtro-btn">Cuidado moderado 🪴</button>
            </div>
        </section>
        
        <section class="catalogo">
            <div id="catalogo-container" class="grid-catalogo"></div>
        </section>
    </main>

    <footer>
        <p>© 2026 Jardín Secreto - Cultivando bienestar 🌸</p>
    </footer>

    <script src="../js/data.js"></script>
    <script src="../js/carrito.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/validaciones.js"></script>
    <script src="../js/eventos.js"></script>
    <script src="../js/catalogo.js"></script>
    <script src="../js/creativo.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
