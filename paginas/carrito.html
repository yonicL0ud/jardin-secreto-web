<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardín Secreto | Carrito</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header style="position: sticky; top: 0; z-index: 1000;">
        <nav class="navbar navbar-expand-lg navbar-dark bg-success">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center" href="../index.html">
                    <img src="../img/logo.svg" alt="Logo" width="40" height="40" class="me-2">
                    <span class="fw-bold">Jardín Secreto</span>
                </a>
                
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal">
                    <span class="navbar-toggler-icon"></span>
                </button>
                
                <div class="collapse navbar-collapse" id="menuPrincipal">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link" href="../index.html">Inicio</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="catalogo.html">Catálogo</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="contacto.html">Contacto</a>
                        </li>
                    </ul>
                    <div class="carrito-icono ms-3" onclick="window.location.href='carrito.html'" style="cursor: pointer;">
                        <span>🛒</span>
                        <span class="contador-carrito" id="contador-header" style="background-color: #F9A8D4; border-radius: 50%; padding: 2px 8px; margin-left: 5px;">0</span>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="carrito-contenido">
            <h2>Mi Carrito 🛒</h2>
            <div id="items-carrito" class="items-carrito"></div>
            <div class="resumen-carrito">
                <div class="resumen-linea">
                    <p>Subtotal:</p>
                    <p id="subtotal">S/ 0.00</p>
                </div>
                <div class="resumen-linea total">
                    <p>Total:</p>
                    <p id="total">S/ 0.00</p>
                </div>
                <button id="vaciar-carrito" class="btn-secundario">Vaciar carrito</button>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 Jardín Secreto - Cultivando bienestar 🌸</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/carrito.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/main.js"></script>
    
</body>
</html>
