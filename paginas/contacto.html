<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jardín Secreto | Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

    <!-- ============================================ -->
    <!-- HEADER -->
    <!-- ============================================ -->
    <header class="sticky-top">
        <nav class="navbar navbar-expand-lg navbar-dark bg-success">
            <div class="container">
                <a class="navbar-brand d-flex align-items-center" href="../index.html">
                    <img src="../img/logo.svg" alt="Logo Jardín Secreto" width="40" height="40" class="me-2" />
                    <span class="fw-bold">Jardín Secreto</span>
                </a>
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#menuPrincipal" aria-controls="menuPrincipal" aria-expanded="false" aria-label="Menú de navegación">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="menuPrincipal">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item"><a class="nav-link" href="../index.html">Inicio</a></li>
                        <li class="nav-item"><a class="nav-link" href="catalogo.html">Catálogo</a></li>
                        <li class="nav-item"><a class="nav-link active" href="contacto.html">Contacto</a></li>
                    </ul>
                    <a class="carrito-icono ms-lg-3" href="carrito.html">
                        <span>🛒</span>
                        <span class="badge rounded-pill bg-danger" id="contador-header">0</span>
                    </a>
                </div>
            </div>
        </nav>
    </header>

    <!-- ============================================ -->
    <!-- MAIN -->
    <!-- ============================================ -->
    <main>
        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6">
                    <div class="card shadow border-0 rounded-4">
                        <div class="card-body p-4 p-md-5 formulario-container">
                            <h2 class="card-title text-center text-success mb-4">Contáctanos 🌸</h2>

                            <form id="contactoForm" novalidate>
                                <!-- Nombre -->
                                <div class="mb-3">
                                    <label for="nombre" class="form-label fw-bold">Nombre completo</label>
                                    <input type="text" id="nombre" name="nombre" class="form-control" placeholder="Tu nombre" required aria-describedby="error-nombre" />
                                    <small class="text-danger error-mensaje" id="error-nombre"></small>
                                </div>

                                <!-- Email -->
                                <div class="mb-3">
                                    <label for="email" class="form-label fw-bold">Correo electrónico</label>
                                    <input type="email" id="email" name="email" class="form-control" placeholder="ejemplo@correo.com" required aria-describedby="error-email" />
                                    <small class="text-danger error-mensaje" id="error-email"></small>
                                </div>

                                <!-- Asunto -->
                                <div class="mb-3">
                                    <label for="asunto" class="form-label fw-bold">Asunto</label>
                                    <select id="asunto" name="asunto" class="form-select">
                                        <option value="consulta">Consulta sobre productos</option>
                                        <option value="pedido">Sobre mi pedido</option>
                                        <option value="sugerencia">Sugerencia</option>
                                        <option value="reclamo">Reclamo</option>
                                    </select>
                                </div>

                                <!-- Mensaje -->
                                <div class="mb-3">
                                    <label for="mensaje" class="form-label fw-bold">Mensaje</label>
                                    <textarea id="mensaje" name="mensaje" class="form-control" rows="5" placeholder="Cuéntanos cómo podemos ayudarte..." required aria-describedby="error-mensaje"></textarea>
                                    <small class="text-danger error-mensaje" id="error-mensaje"></small>
                                </div>

                                <!-- Botón -->
                                <button type="submit" class="btn btn-success w-100 py-2 fs-5">
                                    Enviar mensaje ✨
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-success text-white text-center py-4 mt-5">
        <p class="mb-0">© 2026 Jardín Secreto - Cultivando bienestar 🌸</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js">
    </script>
    <script src="../js/data.js"></script>
    <script src="../js/carrito.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/validaciones.js"></script>
    <script src="../js/main.js"></script>

</body>
</html>
